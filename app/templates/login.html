{% set is_auth_page = true %}
{% extends "base.html" %}

{% block title %}Login — InfuMonitor{% endblock %}

{% block auth_content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div style="text-align:center; margin-bottom:1rem;">
            <div style="font-size:2.5rem;">💧</div>
        </div>
        <h2>InfuMonitor</h2>
        <p class="auth-subtitle">Masuk ke sistem monitoring infus</p>

        {% if error %}
        <div class="auth-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <input type="text" name="username" class="form-input" placeholder="Username" required>
            <input type="password" name="password" class="form-input" placeholder="Password" required>
            <button type="submit" class="btn btn-primary">Masuk</button>
        </form>

        <p style="text-align:center; margin-top:1.5rem; font-size:0.75rem; color:var(--text-muted);">
            Demo: admin / admin123 &nbsp;|&nbsp; perawat / perawat123
        </p>
    </div>
</div>
{% endblock %}
